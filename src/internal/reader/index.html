<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src browser:; style-src browser: 'unsafe-inline'; img-src * data: blob: browser:; font-src * data:; connect-src browser:;" />
  <title>Reader</title>
  <link rel="stylesheet" href="browser://shared/internal.css" />
  <style>
    body { background: var(--bg); }
    .reader { max-width: 720px; margin: 0 auto; padding: 48px 28px 120px; }
    .reader-bar {
      max-width: 720px; margin: 0 auto; padding: 14px 28px;
      display: flex; align-items: center; gap: 14px;
      color: var(--fg-muted); font-size: 13px;
    }
    .reader h1#rTitle { font-size: 30px; line-height: 1.25; margin: 0 0 12px; font-weight: 600; }
    .reader .meta { color: var(--fg-muted); font-size: 13px; margin-bottom: 28px; display: flex; gap: 10px; flex-wrap: wrap; }
    .reader-content { font-size: 18px; line-height: 1.75; color: var(--fg); }
    .reader-content p { margin: 0 0 1.1em; }
    .reader-content h2, .reader-content h3 { line-height: 1.3; margin: 1.6em 0 0.5em; }
    .reader-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; }
    .reader-content a { color: var(--accent); }
    .reader-content blockquote { margin: 1em 0; padding: 0 1em; border-left: 3px solid var(--border); color: var(--fg-secondary); }
    .reader-content pre { background: var(--bg-soft); padding: 14px; border-radius: 8px; overflow: auto; }
    .reader-content figure { margin: 1em 0; }
    .reader-content li { margin: 0.3em 0; }
  </style>
</head>
<body>
  <div class="reader-bar">
    <span id="rSource"></span>
    <span class="spacer" style="flex:1"></span>
    <button class="btn btn-text" id="rOpen">Open original</button>
  </div>
  <article class="reader">
    <h1 id="rTitle">Loading…</h1>
    <div class="meta"><span id="rByline"></span></div>
    <div class="reader-content" id="rContent"></div>
  </article>
  <script src="browser://shared/internal-api.js"></script>
  <script src="reader.js"></script>
</body>
</html>
