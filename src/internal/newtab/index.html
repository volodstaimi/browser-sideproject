<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Tab</title>
  <link rel="stylesheet" href="browser://shared/internal.css" />
  <style>
    html, body { height: 100%; }
    body {
      overflow-x: hidden;
      background:
        radial-gradient(1200px 600px at 50% -10%, var(--accent-subtle), transparent 60%),
        var(--bg);
    }

    .nt {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 14vh 24px 64px;
      opacity: 0;
      transform: translateY(8px);
      animation: nt-fade 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes nt-fade {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Wordmark / logo */
    .nt-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      user-select: none;
    }
    .nt-logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: grid; place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #9b6bff);
      box-shadow: var(--shadow-2);
      flex-shrink: 0;
    }
    .nt-logo svg { width: 30px; height: 30px; display: block; }
    .nt-wordmark {
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1;
      background: linear-gradient(135deg, var(--fg), var(--fg-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Search pill */
    .nt-search {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin-bottom: 56px;
    }
    .nt-search-icon {
      position: absolute;
      left: 20px; top: 50%;
      transform: translateY(-50%);
      width: 20px; height: 20px;
      color: var(--fg-muted);
      pointer-events: none;
    }
    .nt-search input {
      height: 52px;
      width: 100%;
      padding: 0 22px 0 52px;
      border-radius: var(--r-pill);
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-1);
      font-size: 16px;
      transition: box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .nt-search input:hover { box-shadow: var(--shadow-2); }
    .nt-search input:focus {
      background: var(--bg-card);
      border-color: var(--accent);
      box-shadow: var(--shadow-2);
    }
    .nt-search:focus-within .nt-search-icon { color: var(--accent); }

    /* Tiles */
    .nt-tiles-wrap { width: 100%; max-width: 620px; }
    .nt-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
      justify-content: center;
    }
    .nt-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 8px 14px;
      border-radius: var(--r-md);
      cursor: default;
      text-decoration: none;
      color: var(--fg);
      transition: background 0.15s ease, transform 0.12s ease;
      outline: none;
      animation: tile-in 0.3s ease backwards;
    }
    @keyframes tile-in {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .nt-tile:hover { background: var(--bg-hover); }
    .nt-tile:active { transform: scale(0.97); }
    .nt-tile:focus-visible { background: var(--bg-hover); box-shadow: 0 0 0 2px var(--accent); }
    .nt-tile-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-1);
      display: grid; place-items: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .nt-tile-icon img {
      width: 24px; height: 24px;
      display: block;
      object-fit: contain;
    }
    .nt-tile-letter {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
    }
    .nt-tile-label {
      font-size: 12.5px;
      max-width: 96px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--fg-secondary);
    }
    .nt-tile-remove {
      position: absolute;
      top: 6px; right: 6px;
      width: 22px; height: 22px;
      border: none;
      border-radius: 50%;
      background: var(--bg-soft);
      color: var(--fg-secondary);
      display: grid; place-items: center;
      cursor: default;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.12s ease, transform 0.12s ease, background 0.12s ease;
      padding: 0;
      line-height: 0;
    }
    .nt-tile:hover .nt-tile-remove,
    .nt-tile:focus-within .nt-tile-remove { opacity: 1; transform: scale(1); }
    .nt-tile-remove:hover { background: var(--bg-hover); color: var(--fg); }
    .nt-tile-remove svg { width: 12px; height: 12px; }

    /* Add shortcut tile */
    .nt-tile-add .nt-tile-icon {
      background: var(--bg-soft);
      border-style: dashed;
      box-shadow: none;
      color: var(--fg-muted);
    }
    .nt-tile-add .nt-tile-icon svg { width: 22px; height: 22px; }
    .nt-tile-add:hover .nt-tile-icon { color: var(--accent); border-color: var(--accent); }

    /* Incognito explainer */
    .nt-incognito {
      max-width: 540px;
      width: 100%;
      text-align: center;
      padding: 40px 36px;
      border-radius: 16px;
      background: var(--bg-card);
      border: 1px solid var(--hairline);
      box-shadow: var(--shadow-1);
    }
    .nt-incognito-glyph {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: var(--bg-soft);
      display: grid; place-items: center;
      color: var(--fg-secondary);
    }
    .nt-incognito-glyph svg { width: 34px; height: 34px; }
    .nt-incognito h2 { margin: 0 0 12px; font-size: 18px; }
    .nt-incognito p {
      margin: 0;
      color: var(--fg-secondary);
      line-height: 1.65;
      font-size: 13.5px;
    }

    /* Add-shortcut dialog */
    .nt-dialog-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.32);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
      animation: nt-fade-in 0.15s ease;
    }
    .nt-dialog-backdrop.open { display: flex; }
    @keyframes nt-fade-in { from { opacity: 0; } to { opacity: 1; } }
    .nt-dialog {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      box-shadow: var(--shadow-2);
      padding: 22px;
      animation: nt-pop 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes nt-pop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .nt-dialog h2 { margin: 0 0 18px; font-size: 16px; }
    .nt-field { margin-bottom: 14px; }
    .nt-field label {
      display: block;
      font-size: 12px;
      color: var(--fg-secondary);
      margin-bottom: 6px;
    }
    .nt-dialog-error {
      color: var(--danger);
      font-size: 12px;
      min-height: 16px;
      margin: -4px 0 10px;
    }
    .nt-dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    @media (max-width: 480px) {
      .nt { padding-top: 10vh; }
      .nt-wordmark { font-size: 34px; }
      .nt-logo { width: 46px; height: 46px; }
    }
  </style>
</head>
<body>
  <div class="nt">
    <div class="nt-brand">
      <div class="nt-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2 L21 20 L12 16 L3 20 Z" fill="currentColor" />
        </svg>
      </div>
      <div class="nt-wordmark">Aether</div>
    </div>

    <form class="nt-search" id="searchForm" role="search" autocomplete="off">
      <svg class="nt-search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
        <path d="M16.5 16.5 L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <input
        type="text"
        id="searchInput"
        placeholder="Search Google or type a URL"
        aria-label="Search Google or type a URL"
        spellcheck="false"
        autocapitalize="off"
        autocorrect="off"
      />
    </form>

    <div class="nt-tiles-wrap" id="content"></div>
  </div>

  <div class="nt-dialog-backdrop" id="dialogBackdrop">
    <div class="nt-dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <h2 id="dialogTitle">Add shortcut</h2>
      <div class="nt-field">
        <label for="shortcutName">Name</label>
        <input type="text" id="shortcutName" placeholder="Name" autocomplete="off" />
      </div>
      <div class="nt-field">
        <label for="shortcutUrl">URL</label>
        <input type="text" id="shortcutUrl" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
      </div>
      <div class="nt-dialog-error" id="dialogError"></div>
      <div class="nt-dialog-actions">
        <button type="button" class="btn" id="dialogCancel">Cancel</button>
        <button type="button" class="btn btn-primary" id="dialogSave">Done</button>
      </div>
    </div>
  </div>

  <script src="browser://shared/internal-api.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
