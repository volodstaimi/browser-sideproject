<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Problem loading page</title>
  <link rel="stylesheet" href="browser://shared/internal.css" />
  <style>
    .err { max-width: 560px; margin: 0 auto; padding: 18vh 24px 0; }
    .err .glyph { font-size: 56px; line-height: 1; margin-bottom: 18px; }
    .err h1 { margin: 0 0 10px; }
    .err p { color: var(--fg-secondary); line-height: 1.6; }
    .err .url { font-size: 12.5px; color: var(--fg-muted); word-break: break-all; margin: 12px 0 22px; }
    .err code { background: var(--bg-soft); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="err">
    <div class="glyph">😕</div>
    <h1 id="title">This page isn't working</h1>
    <p id="reason">Aether couldn't load the page.</p>
    <div class="url" id="url"></div>
    <button class="btn btn-primary" id="reload">Reload</button>
    <p style="margin-top:18px"><code id="code"></code></p>
  </div>
  <script src="browser://shared/internal-api.js"></script>
  <script src="error.js"></script>
</body>
</html>
