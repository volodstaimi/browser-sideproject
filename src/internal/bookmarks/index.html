<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookmarks</title>
  <link rel="stylesheet" href="browser://shared/internal.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ---- Top bar ---- */
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--hairline);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 5;
    }
    .topbar h1 { margin: 0; white-space: nowrap; }
    .topbar .search-wrap { position: relative; flex: 1; max-width: 460px; }
    .topbar .search-wrap .ico {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--fg-muted); pointer-events: none; font-size: 15px; line-height: 1;
    }
    .topbar .search-wrap input[type="search"] {
      height: 38px; padding-left: 38px; border-radius: var(--r-pill);
    }
    .topbar .search-wrap input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; }

    /* ---- Layout ---- */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 264px; flex-shrink: 0;
      border-right: 1px solid var(--hairline);
      padding: 16px 12px;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sidebar .side-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px 10px;
    }
    .sidebar .side-head .lbl {
      font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      color: var(--fg-muted);
    }
    .icon-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: var(--fg-secondary);
      border-radius: 50%; cursor: default; font-size: 18px; line-height: 1;
      transition: background .15s ease;
    }
    .icon-btn:hover { background: var(--bg-hover); }
    .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

    .folder-tree { list-style: none; margin: 0; padding: 0; }
    .folder-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; margin-bottom: 2px;
      border-radius: var(--r-md); cursor: default;
      color: var(--fg); position: relative;
      transition: background .12s ease;
    }
    .folder-item:hover { background: var(--bg-hover); }
    .folder-item.active { background: var(--accent-subtle); color: var(--accent); font-weight: 500; }
    .folder-item .fico { font-size: 16px; line-height: 1; flex-shrink: 0; }
    .folder-item .fname {
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .folder-item .fcount { font-size: 12px; color: var(--fg-muted); }
    .folder-item.active .fcount { color: var(--accent); }
    .folder-item .del {
      width: 26px; height: 26px; border: none; background: transparent;
      color: var(--fg-muted); border-radius: 50%; cursor: default;
      display: none; align-items: center; justify-content: center;
      font-size: 15px; line-height: 1; flex-shrink: 0;
    }
    .folder-item:hover .del { display: inline-flex; }
    .folder-item .del:hover { background: var(--bg-hover); color: var(--danger); }

    .sidebar-footer {
      margin-top: auto; padding: 12px 10px 4px;
      border-top: 1px solid var(--hairline);
    }
    .toggle-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 2px;
    }
    .toggle-row .toggle-label { flex: 1; color: var(--fg-secondary); }

    /* ---- Main pane ---- */
    .main {
      flex: 1; min-width: 0; overflow-y: auto;
      padding: 22px 28px 60px;
    }
    .main-head {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px;
    }
    .main-head h2 { margin: 0; font-size: 18px; }
    .main-head .count { color: var(--fg-muted); font-size: 13px; }

    .bm-list { display: flex; flex-direction: column; }
    .bm-row {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 12px; border-radius: var(--r-md);
      cursor: default; position: relative;
      transition: background .12s ease;
    }
    .bm-row:hover { background: var(--bg-hover); }
    .bm-row .fav-wrap {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .bm-row .fav-wrap img { width: 16px; height: 16px; border-radius: 3px; }
    .bm-row .fav-wrap .glob { font-size: 15px; line-height: 1; color: var(--fg-muted); }
    .bm-row .bm-text { flex: 1; min-width: 0; }
    .bm-row .bm-title {
      display: block; color: var(--fg); font-size: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; max-width: max-content;
    }
    .bm-row .bm-title:hover { color: var(--accent); text-decoration: underline; }
    .bm-row .bm-url {
      display: block; color: var(--fg-muted); font-size: 12.5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bm-row .bm-actions {
      display: flex; align-items: center; gap: 2px; opacity: 0;
      transition: opacity .12s ease;
    }
    .bm-row:hover .bm-actions, .bm-row:focus-within .bm-actions { opacity: 1; }

    /* ---- Inline editor (add/edit dialog) ---- */
    .editor {
      background: var(--bg-card);
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-1);
      padding: 18px; margin-bottom: 18px;
    }
    .editor h3 { margin: 0 0 14px; font-size: 15px; font-weight: 500; }
    .editor .field { margin-bottom: 12px; }
    .editor .field label {
      display: block; font-size: 12px; color: var(--fg-secondary);
      margin-bottom: 6px;
    }
    .editor .editor-actions {
      display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px;
    }
    .editor .err-msg { color: var(--danger); font-size: 12.5px; margin: -4px 0 10px; min-height: 0; }

    .hidden { display: none !important; }

    /* ---- Toast ---- */
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--fg); color: var(--bg);
      padding: 11px 18px; border-radius: var(--r-md);
      box-shadow: var(--shadow-2); font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
      z-index: 50; max-width: 80vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 720px) {
      .sidebar { width: 210px; }
      .topbar h1 { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Bookmarks</h1>
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="search" id="search" placeholder="Search bookmarks" autocomplete="off" aria-label="Search bookmarks" />
    </div>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="addBookmarkBtn">Add bookmark</button>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-head">
        <span class="lbl">Folders</span>
        <button class="icon-btn" id="addFolderBtn" title="Add folder" aria-label="Add folder">+</button>
      </div>
      <ul class="folder-tree" id="folderTree" role="tree" aria-label="Bookmark folders"></ul>

      <div class="sidebar-footer">
        <div class="toggle-row">
          <span class="toggle-label">Show bookmarks bar</span>
          <label class="switch">
            <input type="checkbox" id="showBarToggle" aria-label="Show bookmarks bar" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </aside>

    <main class="main">
      <div id="editorHost"></div>
      <div class="main-head">
        <h2 id="folderTitle">Bookmarks bar</h2>
        <span class="count" id="folderCount"></span>
      </div>
      <div class="bm-list" id="bmList"></div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="browser://shared/internal-api.js"></script>
  <script src="bookmarks.js"></script>
</body>
</html>
